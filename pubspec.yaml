name: smart_attendance_system
description: "SmartAttend - AI-Powered Smart Attendance System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # HTTP Client
  dio: ^5.7.0

  # BLE
  flutter_blue_plus: ^2.3.9

  # Camera & Image
  camera: ^0.12.0+1
  image_picker: ^1.1.2

  # Secure Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.3

  # Charts
  fl_chart: ^1.2.0

  # Animations
  lottie: ^3.1.3

  # Fonts
  google_fonts: ^8.1.0

  # Permissions
  permission_handler: ^12.0.3

  # Date/Time formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # File handling & export
  path_provider: ^2.1.4
  open_file: ^4.0.0

  # Image processing
  image: ^4.2.0

  # Deep Linking
  app_links: ^7.1.2

  # URL Launcher (WhatsApp share)
  url_launcher: ^6.3.1

  # Network connectivity detection
  connectivity_plus: ^7.1.1

  # Share sheet (native sharing)
  share_plus: ^13.1.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.2

  # Local SQLite (offline queue)
  sqflite: ^2.3.3+1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
