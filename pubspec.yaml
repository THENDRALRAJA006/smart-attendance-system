name: smart_attendance_system
description: "SmartAttend - AI-Powered Smart Attendance System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # HTTP Client
  dio: ^5.7.0

  # BLE
  flutter_blue_plus: ^1.35.4

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Secure Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Charts
  fl_chart: ^0.69.0

  # Animations
  lottie: ^3.1.3

  # Fonts
  google_fonts: ^6.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Date/Time formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # File handling & export
  path_provider: ^2.1.4
  open_file: ^3.5.3

  # Image processing
  image: ^4.2.0

  # Deep Linking
  app_links: ^6.3.2

  # URL Launcher (WhatsApp share)
  url_launcher: ^6.3.1

  # Share sheet (native sharing)
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
