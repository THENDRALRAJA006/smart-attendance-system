# ============================================================
# SmartAttend — Nginx Reverse Proxy Configuration
# ============================================================
# Forwards /api/* to FastAPI backend
# Handles SSL termination (configure SSL certs in /etc/nginx/ssl/)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;   # For face image uploads

    # ─── Rate Limiting ────────────────────────────────────
    # Limit to 30 requests/minute per IP for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=30r/m;
    # General API rate limit: 300 requests/minute
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=300r/m;

    # ─── Gzip Compression ─────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1000;

    # ─── HTTP → HTTPS Redirect ────────────────────────────
    server {
        listen 80;
        server_name smartattend.app www.smartattend.app;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name smartattend.app www.smartattend.app;

        # SSL Configuration
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # ─── Android App Link Verification ────────────────
        # Required for Android app links (deep linking with autoVerify)
        location /.well-known/assetlinks.json {
            default_type application/json;
            return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.smartattend.app","sha256_cert_fingerprints":["YOUR_SHA256_FINGERPRINT_HERE"]}}]';
        }

        # ─── API Endpoints ────────────────────────────────
        location /auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location / {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            # For face image uploads (multipart)
            client_max_body_size 20M;
        }

        # ─── FastAPI Docs (restrict in production) ────────
        location /docs {
            # Uncomment below to restrict to internal network only:
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }
    }
}
