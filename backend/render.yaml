# ============================================================
# SmartAttend AI — Render Deployment Configuration (Production)
# FastAPI backend → Render Web Service
# RDS MySQL (us-east-1) — no AWS Rekognition dependency
# ============================================================

services:
  - type: web
    name: smartattend-api
    runtime: python
    # ── Build: install deps + ensure headless opencv ──────────────
    buildCommand: pip install -r requirements.txt && pip uninstall -y opencv-python opencv-python-headless && pip install opencv-python-headless==4.10.0.84
    # ── 1 worker: safe for Render free tier (512MB RAM)
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info
    plan: free
    region: ohio        # us-east-2 — closest Render region to AWS us-east-1 RDS
    rootDir: backend

    # ── Health check ────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment Variables ───────────────────────────────────────
    envVars:
      # App
      - key: APP_NAME
        value: SmartAttend
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false           # Set to your Render URL after first deploy
      - key: ALLOWED_ORIGINS
        sync: false

      # Python runtime
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

      # MySQL (RDS)
      - key: DB_HOST
        value: smart-attendance-db.cwh6sya6karz.us-east-1.rds.amazonaws.com
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: admin
      - key: DB_NAME
        value: smart_attendance
      - key: DB_PASSWORD
        sync: false           # Set in Render dashboard as secret

      # JWT — Render auto-generates cryptographically random secrets
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: "7"

      # ArcFace (InsightFace) — cosine similarity thresholds (0.0–1.0 scale)
      - key: ARCFACE_SIMILARITY_THRESHOLD
        value: "0.75"         # >= 0.75 → present
      - key: ARCFACE_REVIEW_THRESHOLD
        value: "0.65"         # 0.65–0.74 → manual_review; < 0.65 → rejected
      - key: ARCFACE_MODEL_PATH
        value: "~/.insightface"
