# ============================================================
# SmartAttend AI — Render Deployment Configuration (Production)
# FastAPI backend → Render Web Service
# RDS MySQL (us-east-1) — no AWS Rekognition dependency
# FIXED v2: Python 3.11.9 pinned, starter plan, simplified
#           buildCommand, persistent disk, alembic retry
# ============================================================

services:
  - type: web
    name: smartattend-api
    runtime: python
    pythonVersion: "3.11.9"     # Pinned: insightface 0.7.3 requires ≤ 3.11
    plan: starter               # 2GB RAM — minimum for InsightFace buffalo_l
    region: ohio                # us-east-2 — closest Render region to AWS us-east-1 RDS
    rootDir: backend

    # ── Health check ──────────────────────────────────────────
    healthCheckPath: /health

    # ── Build: install deps + headless OpenCV only ───────────
    # Model download is lazy (face_service.py get_face_analysis_app())
    # so we do NOT pre-download during build — avoids build timeouts
    buildCommand: >
      pip install -r requirements.txt &&
      pip uninstall -y opencv-python opencv-python-headless &&
      pip install opencv-python-headless==4.10.0.84

    # ── Start: alembic with retry + uvicorn ──────────────────
    # Retries alembic 5 times (handles cold RDS wakeup) then
    # starts uvicorn with 120s keep-alive for mobile clients
    startCommand: >
      bash -c "for i in 1 2 3 4 5; do alembic upgrade head && break || (echo 'Migration failed, retrying...' && sleep 5); done &&
      uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info --timeout-keep-alive 120"

    # ── Persistent disk for ArcFace models + static faces ────
    # models_cache: ~1.5GB for buffalo_l ONNX files
    # static/faces: student profile photos (ephemeral without this)
    disk:
      name: smartattend-data
      mountPath: /opt/render/project/src/data
      sizeGB: 3

    # ── Environment Variables ─────────────────────────────────
    envVars:
      # App
      - key: APP_NAME
        value: SmartAttend
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        value: https://smart-attend-ai-20u4.onrender.com
      - key: ALLOWED_ORIGINS
        value: "*"

      # Python runtime
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

      # MySQL (RDS)
      - key: DB_HOST
        value: smart-attendance-db.cwh6sya6karz.us-east-1.rds.amazonaws.com
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: admin
      - key: DB_NAME
        value: smart_attendance
      - key: DB_PASSWORD
        sync: false             # Set in Render Dashboard → Environment (secret)

      # JWT — Render auto-generates cryptographically random secrets
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: "7"

      # ArcFace (InsightFace) — cosine similarity thresholds (0.0–1.0 scale)
      - key: ARCFACE_SIMILARITY_THRESHOLD
        value: "0.75"           # >= 0.75 → present
      - key: ARCFACE_REVIEW_THRESHOLD
        value: "0.65"           # 0.65–0.74 → manual_review; < 0.65 → rejected
      - key: ARCFACE_MODEL_PATH
        value: "/opt/render/project/src/data/models_cache"  # persistent disk
